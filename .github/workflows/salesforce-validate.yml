name: salesforce-validate
on:
  pull_request:
#    types: [opened, synchronize, reopened, ready_for_review]
    branches: 
      - 'main'
    paths:
      - 'force-app/**'
permissions:
  contents: 'read'
  id-token: 'write'
  pull-requests: 'read'
jobs:
  validate-job:
    name: Validate source code
    runs-on: salesforce/cli
    steps:
      - uses: actions/checkout@v6
      - name: Run dummy sf command
        run: sf version
